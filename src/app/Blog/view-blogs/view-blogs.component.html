<section class="full">
  <h2 class="section-title">Authors</h2>

  <section class="author">
    <div class="row d-flex flex-wrap justify-content-start">
      <div
        *ngFor="let item of userList; let i = index; trackBy: trackByFn"
        class="cardmain m-3 p-4 shadow-sm text-center"
      >
        <img
          [src]="item.photoUrl || 'assets/bg5.png'"
          (error)="onImgError($event)"
          class="card-img-top rounded-circle mx-auto"
          alt="{{ item.name }}'s image"
        />

        <div class="card-body">
          <h5 class="card-title">{{ item.name }}</h5>
          <h6 class="text-muted">{{ item.title }}</h6>
          <p class="limit-text">{{ item.description }}</p>
          <button [routerLink]="['/author', item.id]" class="btn-view">View More</button>
        </div>
      </div>
    </div>
  </section>
</section>
